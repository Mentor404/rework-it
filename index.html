    <div class="content">
        <h1>Mentor404</h1>
        <div class="cat">
        <img id="photo" src="https://thecatapi.com/api/images/get?format=src&type=gif" alt="" title="Meow">
        <button id="btn">Get Random Kitty</button>
        <script>
            var btn = document.querySelector("#btn");
            var img = document.querySelector("#photo");

            btn.addEventListener("click", function() {
              var XHR = new XMLHttpRequest();
  
            XHR.onreadystatechange = function() {
                if (XHR.readyState == 4 && XHR.status == 200) {
                    img.src = JSON.parse(XHR.responseText).file;  
                }
            }
            XHR.open("GET", "https://aws.random.cat/meow");
            XHR.send();
            });
        </script>
        </div>
    </div>
</body>
